<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Study</title>

  <!-- loads the jsPsych experiment framework from the internet -->
  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <!-- plugin for screens that show text and wait for a key press -->
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <!-- plugin that forces the browser into fullscreen mode -->
  <script src="https://unpkg.com/@jspsych/plugin-fullscreen@1.2.1"></script>
  <!-- plugin for multi-page instruction slides with Next/Back buttons -->
  <script src="https://unpkg.com/@jspsych/plugin-instructions@1.1.4"></script>
  <!-- plugin for screens that draw shapes and wait for a key press (used for all trial phases) -->
  <script src="https://unpkg.com/@jspsych/plugin-canvas-keyboard-response@1.1.3"></script>
  <!-- plugin for screens that have a text input box (used for participant ID entry) -->
  <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>
  <!-- plugin for yes/no or multiple choice questions -->
  <script src="https://unpkg.com/@jspsych/plugin-survey-multi-choice@1.1.3"></script>
  <!-- default visual styling for jsPsych -->
  <link rel="stylesheet" href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css">

  <style>
    /* dark background so the colored squares pop against it */
    body {
      background-color: #1a1a1a;
      color: #e0e0e0;
      font-family: 'Georgia', serif;
    }
    /* keeps all content centered and not stretched edge to edge */
    .jspsych-content {
      max-width: 800px;
    }
    /* button styling */
    .jspsych-btn {
      background-color: #3a3a3a;
      color: #e0e0e0;
      border: 1px solid #666;
      padding: 10px 24px;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
      margin: 6px;
    }
    .jspsych-btn:hover {
      background-color: #555;
    }
    p, li {
      font-size: 17px;
      line-height: 1.7;
    }
    /* progress bar shown during main trials */
    #progress-bar-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 6px;
      background-color: #333;
      z-index: 9999;
    }
    #progress-bar {
      height: 100%;
      background-color: #457B9D;
      width: 0%;
      transition: width 0.3s ease;
    }
    /* trial counter shown in corner during main trials */
    #trial-counter {
      position: fixed;
      bottom: 12px;
      right: 16px;
      font-size: 13px;
      color: #555;
      font-family: monospace;
      z-index: 9999;
    }
  </style>
</head>
<body>

<!-- progress bar and trial counter injected here, hidden until main trials start -->
<div id="progress-bar-container" style="display:none;"><div id="progress-bar"></div></div>
<div id="trial-counter" style="display:none;"></div>

<script>

// ============================================================
// EXPERIMENT PARAMETERS
// ============================================================
// Everything that controls how the experiment runs lives here.
// Change values here and it updates everywhere automatically.
// Discuss trialsPerCell with Flombaum before preregistration --
// original paper used 12; online samples are larger so this may
// be adjustable without losing statistical power.
// ============================================================
const PARAMS = {

  // how many squares appear on screen at once -- tested at each of these 6 levels
  // 1 square is easiest, 6 is hardest -- same as original Bae et al. (2016)
  memoryLoads: [1, 2, 3, 4, 5, 6],

  // how far the probe square shifts left or right in pixels
  // 6 levels from very small shift to larger shift
  // original paper used visual angle on a fixed lab monitor -- pixels used here
  // because online participants have different screen sizes; adjust after piloting
  displacements: [4, 8, 12, 16, 20, 24],

  // trials per combination of load x displacement x CI type
  // matches original Bae et al. (2016) -- discuss with Flombaum whether to
  // adjust given larger online sample size before preregistration
  trialsPerCell: 10, // 360 main trials + 12 attention checks = ~31 minutes; reduced from original 12 because online sample sizes are larger, fewer trials per person still gives strong power

  // timing in milliseconds (1000ms = 1 second)
  // fixation jitter: randomized between these two values each trial
  // prevents participants from learning the rhythm and pre-responding
  fixationMin: 400,
  fixationMax: 700,

  encodingDuration: 2000,   // how long the colored squares stay visible (memorize them)
  blankDuration: 900,       // blank delay between squares disappearing and probe appearing
  probeDuration: null,      // null = no time limit on response (removed for online)

  // response time above this (in ms) gets flagged as a slow/lapse trial in the data
  // does not exclude the trial, just marks it for analysis decisions
  slowResponseThreshold: 10000,

  // response time below this (in ms) gets flagged as impossibly fast (likely accidental keypress)
  fastResponseThreshold: 150,

  // size of each colored square in pixels
  squareSize: 40,

  // 6 colors, one per square -- each square on a trial gets a unique color
  squareColors: ['#E63946', '#457B9D', '#2DC653', '#F4A261', '#9B5DE5', '#00B4D8'],

  // canvas dimensions in pixels
  canvasWidth: 700,
  canvasHeight: 500,

  // squares placed on a ring around central fixation per Flombaum's note
  ringRadius: 160,

  // attention check: displacement size used for catch trials
  // this is intentionally very large so any attentive participant gets it right
  // if someone fails these they were probably not doing the task
  attentionCheckDisplacement: 80,

  // how many attention check trials to insert into the main experiment
  // these are distributed evenly throughout and labeled in the data
  numAttentionChecks: 12,

  // minimum screen width and height in pixels
  // if smaller than this, the task display will be cramped and data unreliable
  minScreenWidth: 900,
  minScreenHeight: 600,

  // SONA redirect -- replace XXXX with real IDs once study is set up on SONA
  sonaRedirectURL: "https://jhu.sona-systems.com/webstudy_credit.aspx?experiment_id=XXXX&credit_token=XXXX&survey_code="
};


// ============================================================
// HELPER FUNCTIONS
// ============================================================

// returns a random integer between min and max (inclusive)
// used for fixation jitter so participants can't predict when squares appear
function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

// calculates x,y positions for n squares evenly spaced on a ring around canvas center
// starts from the top (12 o'clock) and goes clockwise
function getRingPositions(n, radius, centerX, centerY) {
  const positions = [];
  for (let i = 0; i < n; i++) {
    const angle = (2 * Math.PI * i / n) - (Math.PI / 2);
    positions.push({
      x: centerX + radius * Math.cos(angle),
      y: centerY + radius * Math.sin(angle)
    });
  }
  return positions;
}

// randomly reorders a list -- used to randomize trial order and color assignments
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// checks if the participant's screen is large enough to run the task properly
// returns true if screen is big enough, false if too small
function screenIsLargeEnough() {
  return window.screen.width >= PARAMS.minScreenWidth &&
         window.screen.height >= PARAMS.minScreenHeight;
}


// ============================================================
// TRIAL GENERATION WITH C/I CLASSIFICATION
// ============================================================
// Builds every trial before the experiment starts.
// Each trial is classified as Consistent (C) or Inconsistent (I)
// at generation time -- not post-hoc like the original paper.
// This is what makes the C/I analysis preregisterable.
//
// Consistent: even if participant compares probe to wrong square
// (correspondence error), they still give the correct answer.
//
// Inconsistent: a correspondence error would flip their answer to wrong.
// These trials reveal correspondence errors in the data.
// ============================================================
function generateTrials(trialsPerCell, isAttentionCheck = false) {
  const trials = [];
  const cx = PARAMS.canvasWidth / 2;
  const cy = PARAMS.canvasHeight / 2;

  for (const load of PARAMS.memoryLoads) {
    for (const displacement of PARAMS.displacements) {
      const reps = isAttentionCheck ? 0 : trialsPerCell; // attention checks generated separately
      for (let rep = 0; rep < reps; rep++) {

        // pick 'load' colors randomly without repeating
        const colors = shuffle([...PARAMS.squareColors]).slice(0, load);

        // place squares evenly on the ring
        const positions = getRingPositions(load, PARAMS.ringRadius, cx, cy);

        // randomly pick which square is the probe
        const targetIdx = Math.floor(Math.random() * load);
        const targetPos = positions[targetIdx];

        // randomly decide left or right
        const direction = Math.random() < 0.5 ? 'left' : 'right';
        const dx = direction === 'right' ? displacement : -displacement;
        const probeX = targetPos.x + dx;

        // C/I classification
        // load=1 has no other squares to confuse with -- always consistent
        let ciType = 'consistent';

        if (load > 1) {
          // find the closest non-target square (most likely source of a correspondence error)
          let minDist = Infinity;
          let nearestPos = null;
          for (let i = 0; i < load; i++) {
            if (i === targetIdx) continue;
            const d = Math.hypot(positions[i].x - targetPos.x, positions[i].y - targetPos.y);
            if (d < minDist) { minDist = d; nearestPos = positions[i]; }
          }
          // if participant used nearestPos instead of target, what direction would they report?
          const errorDx = probeX - nearestPos.x;
          const errorDirection = errorDx > 0 ? 'right' : 'left';
          ciType = (errorDirection === direction) ? 'consistent' : 'inconsistent';
        }

        trials.push({
          load, displacement, rep, colors, positions,
          targetIdx, targetPos,
          direction, probeX,
          probeY: targetPos.y,
          ciType,
          isAttentionCheck: false,
          fixationDuration: randInt(PARAMS.fixationMin, PARAMS.fixationMax) // jittered fixation
        });
      }
    }
  }
  return trials;
}

// generates attention check trials -- same structure as normal trials but with
// a very large displacement that any attentive participant should get right
function generateAttentionChecks(n) {
  const checks = [];
  const cx = PARAMS.canvasWidth / 2;
  const cy = PARAMS.canvasHeight / 2;
  for (let i = 0; i < n; i++) {
    const load = randInt(1, 3); // keep load low so attention check is clearly easy
    const colors = shuffle([...PARAMS.squareColors]).slice(0, load);
    const positions = getRingPositions(load, PARAMS.ringRadius, cx, cy);
    const targetIdx = Math.floor(Math.random() * load);
    const targetPos = positions[targetIdx];
    const direction = Math.random() < 0.5 ? 'left' : 'right';
    const dx = direction === 'right' ? PARAMS.attentionCheckDisplacement : -PARAMS.attentionCheckDisplacement;
    const probeX = targetPos.x + dx;
    checks.push({
      load, displacement: PARAMS.attentionCheckDisplacement,
      rep: 0, colors, positions,
      targetIdx, targetPos,
      direction, probeX,
      probeY: targetPos.y,
      ciType: 'consistent', // large displacement always consistent
      isAttentionCheck: true,
      fixationDuration: randInt(PARAMS.fixationMin, PARAMS.fixationMax)
    });
  }
  return checks;
}

// inserts attention check trials evenly throughout the main trial list
function insertAttentionChecks(mainTrials, checks) {
  const total = mainTrials.length + checks.length;
  const interval = Math.floor(total / (checks.length + 1));
  const combined = [...mainTrials];
  checks.forEach((check, i) => {
    const insertAt = Math.min((i + 1) * interval, combined.length);
    combined.splice(insertAt, 0, check);
  });
  return combined;
}


// ============================================================
// DRAWING FUNCTIONS
// ============================================================
// Each function clears the canvas then draws what it needs.
// Canvas origin (0,0) is top-left. x increases right, y increases down.

// draws a small + cross at the center -- participant keeps eyes here throughout
function drawFixation(ctx, w, h) {
  ctx.clearRect(0, 0, w, h);
  ctx.strokeStyle = '#e0e0e0';
  ctx.lineWidth = 2;
  const cx = w / 2, cy = h / 2, size = 10;
  ctx.beginPath();
  ctx.moveTo(cx - size, cy); ctx.lineTo(cx + size, cy);
  ctx.moveTo(cx, cy - size); ctx.lineTo(cx, cy + size);
  ctx.stroke();
}

// draws fixation cross plus all colored squares (encoding phase -- memorize positions)
function drawEncoding(ctx, w, h, trial) {
  ctx.clearRect(0, 0, w, h);
  drawFixation(ctx, w, h);
  const half = PARAMS.squareSize / 2;
  for (let i = 0; i < trial.load; i++) {
    ctx.fillStyle = trial.colors[i];
    ctx.fillRect(trial.positions[i].x - half, trial.positions[i].y - half, PARAMS.squareSize, PARAMS.squareSize);
  }
}

// draws only the fixation cross -- blank memory delay between encoding and probe
function drawBlank(ctx, w, h) {
  ctx.clearRect(0, 0, w, h);
  drawFixation(ctx, w, h);
}

// draws fixation cross plus the probe square at its shifted position
// participant presses F (left) or J (right) here
function drawProbe(ctx, w, h, trial) {
  ctx.clearRect(0, 0, w, h);
  drawFixation(ctx, w, h);
  const half = PARAMS.squareSize / 2;
  ctx.fillStyle = trial.colors[trial.targetIdx];
  ctx.fillRect(trial.probeX - half, trial.probeY - half, PARAMS.squareSize, PARAMS.squareSize);
}


// ============================================================
// INITIALIZE JSPSYCH
// ============================================================
// Sets up jsPsych and defines what happens when the experiment finishes.
// ============================================================
const jsPsych = initJsPsych({
  on_finish: function(data) {

    // hide progress bar and counter
    document.getElementById('progress-bar-container').style.display = 'none';
    document.getElementById('trial-counter').style.display = 'none';

    // download only probe response rows as a CSV file
    // named using participant ID so we know whose data it is
    const csv = jsPsych.data.get().filter({ phase: 'probe' }).csv();
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `swm_data_${jsPsych.data.get().values()[0]?.participant_id || 'unknown'}.csv`;
    a.click();

    // redirect to SONA for course credit
    // SONA passes ?survey_code=XXXX in the URL; we read it and pass it back
    const urlParams = new URLSearchParams(window.location.search);
    const surveyCode = urlParams.get('survey_code') || '';
    if (surveyCode) {
      setTimeout(() => { window.location.href = PARAMS.sonaRedirectURL + surveyCode; }, 2000);
    }
  }
});


// ============================================================
// TIMELINE
// ============================================================
// The ordered list of every screen the participant sees.
// Order:
//   1. Mobile/device block (if on phone or tablet)
//   2. Screen size check
//   3. Fullscreen
//   4. Consent
//   5. Colorblindness check
//   6. Participant ID
//   7. Instructions
//   8. Practice trials with feedback
//   9. Practice complete
//  10. Main trials with attention checks, progress bar, breaks
//  11. Debrief
// ============================================================
const timeline = [];


// 1. MOBILE/DEVICE BLOCK
// if participant is on a phone or tablet, stop them immediately
// the task requires a physical keyboard with F and J keys
const isMobile = /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|Mobile/i.test(navigator.userAgent);
if (isMobile) {
  timeline.push({
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `<div style="max-width:600px; margin:auto; text-align:center; padding:40px;">
      <h2>Incompatible Device</h2>
      <p>This study requires a desktop or laptop computer with a physical keyboard.</p>
      <p>Please return on a computer to participate.</p>
      <p>If you signed up through SONA, you may return to SONA and sign up for a different time slot.</p>
    </div>`,
    choices: 'NO_KEYS' // no way to proceed -- stops the experiment here
  });
} else {

// 2. SCREEN SIZE CHECK
// warns participant if their screen is too small before they start
// small screens distort the spatial layout and make data unreliable
timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: function() {
    if (!screenIsLargeEnough()) {
      return `<div style="max-width:600px; margin:auto; text-align:center;">
        <h2>Screen Size Warning</h2>
        <p>Your screen appears to be smaller than recommended for this study (${window.screen.width} x ${window.screen.height} pixels).</p>
        <p>For best results, please use a larger monitor. You may continue but display quality may be affected.</p>
        <p>Press any key to continue anyway.</p>
      </div>`;
    } else {
      return `<div style="display:none;"></div>`; // screen is fine, skip silently
    }
  },
  choices: 'ALL_KEYS',
  trial_duration: function() {
    return screenIsLargeEnough() ? 0 : null; // auto-skip if screen is fine
  },
  data: { phase: 'screen_check', screen_width: window.screen.width, screen_height: window.screen.height }
});


// 3. FULLSCREEN
// forces fullscreen before anything else starts
timeline.push({
  type: jsPsychFullscreen,
  fullscreen_mode: true,
  message: '<p>This study requires fullscreen mode.</p>',
  button_label: 'Enter Fullscreen and Begin'
});


// 4. CONSENT
// standard consent screen required for IRB and SONA studies
// participant must click Agree to proceed -- cannot press Next without agreeing
timeline.push({
  type: jsPsychInstructions,
  pages: [
    `<div style="max-width:650px; margin:auto; text-align:left;">
      <h2 style="text-align:center;">Consent to Participate</h2>
      <p><strong>Study:</strong> Spatial Working Memory and Object Correspondence</p>
      <p><strong>Institution:</strong> Johns Hopkins University, Flombaum Lab</p>
      <p><strong>What you will do:</strong> You will view colored squares and make judgments about their positions. The study takes approximately 25-30 minutes.</p>
      <p><strong>Risks:</strong> There are no known risks beyond those of normal computer use.</p>
      <p><strong>Confidentiality:</strong> Your data will be stored anonymously using your SONA participant ID. No personally identifying information is collected.</p>
      <p><strong>Voluntary:</strong> Participation is voluntary. You may stop at any time by closing the browser, though you must complete the study to receive SONA credit.</p>
      <p><strong>Contact:</strong> Questions? Contact the Flombaum Lab at Johns Hopkins University.</p>
      <p style="margin-top:24px;">By clicking <strong>I Agree</strong>, you confirm that you are 18 or older and consent to participate.</p>
    </div>`
  ],
  show_clickable_nav: true,
  button_label_next: 'I Agree',
  data: { phase: 'consent' }
});


// 5. COLORBLINDNESS CHECK
// participants with color vision deficiency may struggle to identify the probe
// by color, which could affect performance -- flagged in data for analysis decisions
// this is a self-report, not a clinical test
timeline.push({
  type: jsPsychSurveyMultiChoice,
  questions: [{
    prompt: 'Do you have any form of color blindness or color vision deficiency?',
    name: 'colorblind',
    options: ['No', 'Yes', 'I am not sure'],
    required: true
  }],
  on_finish: function(data) {
    // save the response so we can flag colorblind participants during analysis
    jsPsych.data.addProperties({ colorblind: data.response.colorblind });
  },
  data: { phase: 'colorblind_check' }
});


// 6. PARTICIPANT ID
// links this session's data to their SONA account
// the ID is attached to every row of data automatically
timeline.push({
  type: jsPsychSurveyText,
  questions: [{
    prompt: 'Please enter your SONA participant ID:',
    name: 'participant_id',
    required: true
  }],
  on_finish: function(data) {
    const id = data.response.participant_id;
    jsPsych.data.addProperties({ participant_id: id });
  },
  data: { phase: 'participant_id' }
});


// 7. INSTRUCTIONS
// three pages explaining the task before practice starts
timeline.push({
  type: jsPsychInstructions,
  pages: [
    // page 1: what the task is
    `<div style="max-width:600px; margin:auto; text-align:left;">
      <h2 style="text-align:center;">Welcome</h2>
      <p>In this study, you will see a set of colored squares appear briefly on the screen.</p>
      <p>Your job is to <strong>remember where each square was located</strong>.</p>
      <p>After a short delay, <strong>one square will reappear</strong> but slightly shifted from its original position.</p>
      <p>You will judge whether it moved <strong>LEFT</strong> or <strong>RIGHT</strong>.</p>
      <p>Press <strong>F</strong> for LEFT &nbsp;&nbsp; Press <strong>J</strong> for RIGHT</p>
    </div>`,

    // page 2: tips
    `<div style="max-width:600px; margin:auto; text-align:left;">
      <h2 style="text-align:center;">Tips</h2>
      <p>Try to keep your eyes on the <strong>center cross</strong> throughout each trial.</p>
      <p>Respond as <strong>accurately</strong> as possible. Speed is less important than accuracy.</p>
      <p>The task gets harder with more squares on screen. This is expected and normal.</p>
      <p>You will get a short break every 60 trials and can see your progress at the bottom of the screen.</p>
      <p>The study takes about <strong>25 to 30 minutes</strong>.</p>
    </div>`,

    // page 3: ready
    `<div style="max-width:600px; margin:auto; text-align:center;">
      <h2>Ready?</h2>
      <p>You will start with a short practice round where you will receive feedback after each trial.</p>
      <p>Press Next to begin.</p>
    </div>`
  ],
  show_clickable_nav: true,
  button_label_next: 'Next',
  button_label_previous: 'Back',
  data: { phase: 'instructions' }
});


// 8. PRACTICE TRIALS WITH FEEDBACK
// 6 easy trials (load 1-2 only) so participant learns the task
// after each probe response, shows Correct or Incorrect for 800ms
// feedback only shown during practice -- never during main experiment
// practice data is labeled practice: true and excluded from analysis
const practiceTrials = generateTrials(99)
  .filter(t => t.load <= 2)
  .slice(0, 6);

for (const trial of practiceTrials) {

  // fixation cross with jittered duration
  timeline.push({
    type: jsPsychCanvasKeyboardResponse,
    canvas_size: [PARAMS.canvasHeight, PARAMS.canvasWidth],
    stimulus: (c) => { drawFixation(c.getContext('2d'), PARAMS.canvasWidth, PARAMS.canvasHeight); },
    choices: 'NO_KEYS',
    trial_duration: trial.fixationDuration,
    data: { phase: 'fixation', practice: true }
  });

  // colored squares appear -- memorize positions
  timeline.push({
    type: jsPsychCanvasKeyboardResponse,
    canvas_size: [PARAMS.canvasHeight, PARAMS.canvasWidth],
    stimulus: (c) => { drawEncoding(c.getContext('2d'), PARAMS.canvasWidth, PARAMS.canvasHeight, trial); },
    choices: 'NO_KEYS',
    trial_duration: PARAMS.encodingDuration,
    data: { phase: 'encoding', practice: true }
  });

  // blank memory delay
  timeline.push({
    type: jsPsychCanvasKeyboardResponse,
    canvas_size: [PARAMS.canvasHeight, PARAMS.canvasWidth],
    stimulus: (c) => { drawBlank(c.getContext('2d'), PARAMS.canvasWidth, PARAMS.canvasHeight); },
    choices: 'NO_KEYS',
    trial_duration: PARAMS.blankDuration,
    data: { phase: 'blank', practice: true }
  });

  // probe response with feedback after
  timeline.push({
    type: jsPsychCanvasKeyboardResponse,
    canvas_size: [PARAMS.canvasHeight, PARAMS.canvasWidth],
    stimulus: (c) => { drawProbe(c.getContext('2d'), PARAMS.canvasWidth, PARAMS.canvasHeight, trial); },
    choices: ['f', 'j'],
    trial_duration: PARAMS.probeDuration,
    data: {
      phase: 'probe', practice: true,
      load: trial.load, displacement: trial.displacement,
      correct_direction: trial.direction, ci_type: trial.ciType,
      target_idx: trial.targetIdx, is_attention_check: false
    },
    on_finish: function(data) {
      const response = data.response === 'f' ? 'left' : 'right';
      data.response_direction = response;
      data.correct = response === data.correct_direction;
      data.slow_response = data.rt > PARAMS.slowResponseThreshold;
      data.fast_response = data.rt < PARAMS.fastResponseThreshold;
    }
  });

  // feedback screen -- shown only during practice
  // tells participant if they got it right or wrong so they learn the task
  timeline.push({
    type: jsPsychHtmlKeyboardResponse,
    stimulus: function() {
      const last = jsPsych.data.get().last(1).values()[0];
      if (last.correct) {
        return '<div style="text-align:center; font-size:28px; color:#2DC653;">Correct</div>';
      } else {
        return '<div style="text-align:center; font-size:28px; color:#E63946;">Incorrect</div>';
      }
    },
    choices: 'NO_KEYS',
    trial_duration: 800, // shows for 800ms then auto-advances
    data: { phase: 'feedback', practice: true }
  });
}


// 9. PRACTICE COMPLETE SCREEN
timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `<div style="text-align:center;">
    <h2>Practice Complete</h2>
    <p>The real experiment is about to begin. You will no longer receive feedback after each trial.</p>
    <p>Remember: <strong>F = LEFT &nbsp;&nbsp; J = RIGHT</strong></p>
    <p>Press any key to start.</p>
  </div>`,
  choices: 'ALL_KEYS',
  data: { phase: 'practice_complete' }
});


// 10. MAIN EXPERIMENT TRIALS
// generates all trials, adds attention checks, then runs them with:
//   - progress bar at top of screen
//   - trial counter in bottom corner
//   - break screen every 60 trials
//   - response flags for slow/fast responses and attention checks
const mainTrials = shuffle(generateTrials(PARAMS.trialsPerCell));
const attentionChecks = generateAttentionChecks(PARAMS.numAttentionChecks);
const allTrials = insertAttentionChecks(mainTrials, attentionChecks);
const totalTrials = allTrials.length;
let trialCount = 0;

// show progress bar and counter now that main trials are starting
timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: '<div style="display:none;"></div>',
  choices: 'NO_KEYS',
  trial_duration: 0,
  on_start: function() {
    document.getElementById('progress-bar-container').style.display = 'block';
    document.getElementById('trial-counter').style.display = 'block';
  }
});

for (const trial of allTrials) {
  trialCount++;
  const currentTrial = trialCount; // capture for closure

  // break every 60 trials (skip after last trial since debrief comes next)
  if (trialCount % 60 === 0 && trialCount < allTrials.length) {
    timeline.push({
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `<div style="text-align:center;">
        <h2>Take a Break</h2>
        <p>You have completed ${trialCount} of ${totalTrials} trials.</p>
        <p>Rest as long as you need, then press any key to continue.</p>
      </div>`,
      choices: 'ALL_KEYS',
      data: { phase: 'break' }
    });
  }

  // fixation cross with jittered duration (different each trial)
  timeline.push({
    type: jsPsychCanvasKeyboardResponse,
    canvas_size: [PARAMS.canvasHeight, PARAMS.canvasWidth],
    stimulus: (c) => { drawFixation(c.getContext('2d'), PARAMS.canvasWidth, PARAMS.canvasHeight); },
    choices: 'NO_KEYS',
    trial_duration: trial.fixationDuration,
    data: { phase: 'fixation', practice: false }
  });

  // colored squares appear (encoding)
  timeline.push({
    type: jsPsychCanvasKeyboardResponse,
    canvas_size: [PARAMS.canvasHeight, PARAMS.canvasWidth],
    stimulus: (c) => { drawEncoding(c.getContext('2d'), PARAMS.canvasWidth, PARAMS.canvasHeight, trial); },
    choices: 'NO_KEYS',
    trial_duration: PARAMS.encodingDuration,
    data: { phase: 'encoding', practice: false }
  });

  // blank memory delay
  timeline.push({
    type: jsPsychCanvasKeyboardResponse,
    canvas_size: [PARAMS.canvasHeight, PARAMS.canvasWidth],
    stimulus: (c) => { drawBlank(c.getContext('2d'), PARAMS.canvasWidth, PARAMS.canvasHeight); },
    choices: 'NO_KEYS',
    trial_duration: PARAMS.blankDuration,
    data: { phase: 'blank', practice: false }
  });

  // probe response -- this row gets saved to the data file
  // updates progress bar and counter after each response
  timeline.push({
    type: jsPsychCanvasKeyboardResponse,
    canvas_size: [PARAMS.canvasHeight, PARAMS.canvasWidth],
    stimulus: (c) => { drawProbe(c.getContext('2d'), PARAMS.canvasWidth, PARAMS.canvasHeight, trial); },
    choices: ['f', 'j'],
    trial_duration: PARAMS.probeDuration,
    data: {
      phase: 'probe',
      practice: false,
      load: trial.load,                        // how many squares were shown (1-6)
      displacement: trial.displacement,         // how far probe shifted in pixels
      correct_direction: trial.direction,       // correct answer: 'left' or 'right'
      ci_type: trial.ciType,                   // 'consistent' or 'inconsistent'
      target_idx: trial.targetIdx,              // which square index was the probe
      probe_x: trial.probeX,                   // probe x after displacement
      target_x: trial.targetPos.x,             // probe original x
      target_y: trial.targetPos.y,             // probe y (unchanged)
      is_attention_check: trial.isAttentionCheck // true = this was a catch trial
    },
    on_finish: function(data) {
      // convert f/j to direction label and check accuracy
      const response = data.response === 'f' ? 'left' : 'right';
      data.response_direction = response;
      data.correct = response === data.correct_direction;

      // flag suspiciously slow or fast responses for analysis review
      // does not remove the trial -- just marks it
      data.slow_response = data.rt > PARAMS.slowResponseThreshold;
      data.fast_response = data.rt < PARAMS.fastResponseThreshold;

      // update the progress bar width based on how far through the trials we are
      const pct = (currentTrial / totalTrials) * 100;
      document.getElementById('progress-bar').style.width = pct + '%';

      // update the trial counter text in the bottom corner
      document.getElementById('trial-counter').textContent =
        `Trial ${currentTrial} of ${totalTrials}`;
    }
  });
}


// 11. DEBRIEF
// shown after all trials complete
// explains what the study was about
// on_finish above handles CSV download and SONA redirect
timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `<div style="max-width:600px; margin:auto; text-align:center;">
    <h2>Study Complete. Thank You!</h2>
    <p>This study investigates how people remember and compare the locations of objects in space.</p>
    <p>Specifically, we are interested in whether errors in spatial memory arise from forgetting locations, or from confusing which object is which -- a phenomenon called a <em>correspondence error</em>.</p>
    <p>Your data is being saved now.</p>
    <p>If you are receiving SONA credit, you will be redirected automatically in a few seconds.</p>
    <p>If the redirect does not happen, you may close this tab and return to SONA manually.</p>
    <p style="margin-top:30px; font-size:14px; color:#888;">Questions? Contact the Flombaum Lab at Johns Hopkins University.</p>
  </div>`,
  choices: 'ALL_KEYS',
  data: { phase: 'debrief' }
});

} // closes the mobile check else block

// launches the experiment and runs through the timeline from top to bottom
jsPsych.run(timeline);

</script>
</body>
